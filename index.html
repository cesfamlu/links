<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isikha | Mejorando el sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --accent-blue: #3b82f6;
        }

        body {
            background-color: var(--primary-bg);
            color: #f9fafb;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Fondo animado estilo Isikha */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(147, 51, 234, 0.15) 0%, transparent 50%);
            filter: blur(80px);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glow-button {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .dots-loader::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-mesh"></div>

    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-8 text-center relative overflow-hidden">
        <!-- Efecto de brillo superior -->
        <div class="absolute top-0 left-0 w-full h-1 shimmer"></div>

        <!-- Logo Area -->
        <div class="mb-10 flex justify-center">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition"></div>
                <div class="relative bg-black rounded-2xl p-4 border border-white/10">
                    <!-- Intenta cargar tu logo real -->
                    <img src="img/Isikha.png" alt="Logo" class="h-10 w-auto" onerror="this.style.display='none'; document.getElementById('txt-logo').style.display='block'">
                    <span id="txt-logo" class="hidden text-2xl font-extrabold tracking-tighter">ISIKHA</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="space-y-6">
            <div class="inline-block px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20">
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest dots-loader">Actualizando sistema</p>
            </div>

            <h1 class="text-3xl font-extrabold leading-tight tracking-tight px-2">
                Estamos mejorando la <span class="text-blue-500">plataforma</span> para ti.
            </h1>

            <p class="text-gray-400 text-sm leading-relaxed px-4">
                Estamos aplicando mejoras en el rendimiento y nuevas funciones. No tardaremos mucho.
            </p>

            <!-- Time Display -->
            <div class="py-6 px-4 bg-white/5 rounded-3xl border border-white/5">
                <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">Volvemos a las</p>
                <h2 class="text-4xl font-bold text-white tracking-tight">12:30 <span class="text-blue-500 text-2xl">PM</span></h2>
            </div>

            <!-- Botón falso/informativo -->
            <button class="w-full py-4 rounded-2xl glow-button text-white font-bold text-sm uppercase tracking-widest">
                Reintentar pronto
            </button>
        </div>

        <!-- Footer -->
        <div class="mt-10 pt-6 border-t border-white/5 text-[10px] text-gray-600 flex justify-between items-center px-2">
            <span>© 2024 ISIKHA PROJECT</span>
            <div class="flex space-x-3">
                <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                <span class="text-blue-500/50">SERVER ON</span>
            </div>
        </div>
    </div>

    <script>
        // Animación de entrada suave
        document.body.style.opacity = '0';
        window.onload = () => {
            document.body.style.transition = 'opacity 0.8s ease-out';
            document.body.style.opacity = '1';
        };
    </script>
</body>
</html>
