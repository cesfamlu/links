    <style>
        body {
            background-color: #4c3889; /* Fondo púrpura */
            color: white;
            font-family: Arial, sans-serif;
        }

        .header {
            text-align: center;
            margin: 30px 0;
        }

        .header img {
            max-width: 600px; /* Ajuste proporcional */
            margin-bottom: -7rem;
            margin-top: -5rem;
            width: 100%;
            height: auto;
        }

        .header h1 {
            margin-top: 20px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .button {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            font-size: 1.2rem;
            color: white;
            background-color: #00a676; /* Verde */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: orange;
        }

        .links {
            display: none;
            margin-top: 20px;
        }

        .links a {
            text-decoration: none;
            color: white;
            display: block;
            padding: 10px;
            background-color: #3e2766;
            border-radius: 5px;
            text-align: center;
            transition: background-color 0.3s;
        }

        .links a:hover {
            background-color: blue;
        }

        footer {
            background-color: #1f1235; /* Footer púrpura oscuro */
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        footer a {
            color: #00a676;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
